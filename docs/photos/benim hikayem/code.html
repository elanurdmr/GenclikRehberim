<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .floating-shape {
            animation: float 6s ease-in-out infinite;
        }

        .entrance-fade {
            animation: fadeInScale 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .choice-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .choice-btn:active {
            transform: scale(0.96);
        }
    </style>

<body class="bg-background text-on-surface min-h-screen overflow-x-hidden font-body-base selection:bg-primary/20">
<!-- Background Atmospheric Elements -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="floating-shape absolute top-20 left-10 w-32 h-32 bg-primary-fixed opacity-30 rounded-full blur-3xl"></div>
<div class="floating-shape absolute bottom-40 right-20 w-48 h-48 bg-secondary-fixed opacity-20 rounded-full blur-3xl" style="animation-delay: -2s;"></div>
<div class="floating-shape absolute top-1/2 left-1/3 w-24 h-24 bg-tertiary-fixed opacity-20 rounded-full blur-2xl" style="animation-delay: -4s;"></div>
</div>
<!-- Top Navigation Anchor (Shared Component Mapping) -->
<header class="sticky top-0 z-40 bg-surface dark:bg-surface-dim shadow-[0_20px_40px_rgba(74,144,226,0.1)] transition-all duration-300">
<div class="flex justify-between items-center w-full px-margin py-base max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<span class="font-headline-md text-headline-md font-extrabold text-primary dark:text-primary-fixed-dim tracking-tight">SafeSpace</span>
</div>
<div class="hidden md:flex items-center gap-8">
<nav class="flex gap-6">
<a class="text-primary font-bold border-b-2 border-primary pb-1 font-title-sm text-title-sm transition-colors" href="#">Story</a>
<a class="text-on-surface-variant font-medium font-title-sm text-title-sm hover:bg-primary-container/10 transition-colors px-2 py-1 rounded-lg" href="#">Stats</a>
<a class="text-on-surface-variant font-medium font-title-sm text-title-sm hover:bg-primary-container/10 transition-colors px-2 py-1 rounded-lg" href="#">Map</a>
</nav>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-full hover:bg-primary-container/10 active:scale-95 transition-all">
<span class="material-symbols-outlined text-primary">military_tech</span>
</button>
<button class="p-2 rounded-full hover:bg-primary-container/10 active:scale-95 transition-all">
<span class="material-symbols-outlined text-primary">account_circle</span>
</button>
</div>
</div>
</header>
<main class="relative z-10 max-w-4xl mx-auto px-margin py-lg flex flex-col gap-lg">
<!-- Header Zone: Game Stats -->
<section class="flex flex-col md:flex-row items-center justify-between gap-md bg-surface-container-lowest/80 backdrop-blur-md p-md rounded-3xl shadow-sm border border-surface-variant/50">
<div class="flex items-center gap-6">
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-full bg-tertiary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
<div>
<p class="text-label-caps font-label-caps text-on-surface-variant opacity-70">TOPLAM PUAN</p>
<p class="font-title-sm text-title-sm text-on-surface">Skor: 450</p>
</div>
</div>
<div class="h-10 w-px bg-surface-variant"></div>
<div class="flex flex-col gap-1 min-w-[120px]">
<div class="flex justify-between items-center">
<p class="text-label-caps font-label-caps text-on-surface-variant opacity-70">İLERLEME</p>
<p class="text-label-caps font-label-caps text-primary">2/5</p>
</div>
<div class="w-full h-3 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-secondary-fixed w-[40%] rounded-full shadow-[0_0_10px_rgba(161,250,73,0.5)]"></div>
</div>
</div>
</div>
<button class="flex items-center gap-2 px-md py-sm bg-primary text-on-primary rounded-full font-title-sm text-title-sm active:scale-95 transition-transform hover:bg-primary-container shadow-md">
<span class="material-symbols-outlined">restart_alt</span>
<span>Baştan Başla</span>
</button>
</section>
<!-- Story Card -->
<section class="entrance-fade">
<div class="bg-surface-container-lowest rounded-3xl p-lg md:p-xl shadow-[0_20px_40px_rgba(74,144,226,0.12)] border-t-4 border-primary relative overflow-hidden group">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-bl-full pointer-events-none"></div>
<div class="flex flex-col items-center text-center gap-md">
<div class="w-20 h-20 rounded-full bg-primary-fixed flex items-center justify-center shadow-inner">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface max-w-2xl leading-tight">
                        Okul kantininde bir arkadaşının tek başına oturduğunu ve diğerlerinin ona güldüğünü gördün. Ne yaparsın?
                    </h2>
<div class="w-16 h-1.5 bg-surface-variant rounded-full mt-2"></div>
</div>
</div>
</section>
<!-- Choice Buttons Grid -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Choice 1 -->
<button class="choice-btn group flex flex-col items-start p-md bg-white border-2 border-transparent hover:border-primary-fixed-dim rounded-3xl shadow-[0_10px_20px_rgba(0,0,0,0.04)] hover:shadow-lg text-left transition-all relative overflow-hidden">
<div class="absolute inset-x-0 bottom-0 h-1.5 bg-[#E9D5FF]"></div>
<div class="w-10 h-10 rounded-full bg-[#F3E8FF] flex items-center justify-center mb-base text-[#9333EA]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">handshake</span>
</div>
<p class="font-title-sm text-title-sm text-on-surface group-hover:text-primary transition-colors">Yanına gidip selam veririm</p>
<p class="text-body-base font-body-base text-on-surface-variant mt-1 opacity-80">Empati kurarak destek ol.</p>
</button>
<!-- Choice 2 -->
<button class="choice-btn group flex flex-col items-start p-md bg-white border-2 border-transparent hover:border-primary-fixed-dim rounded-3xl shadow-[0_10px_20px_rgba(0,0,0,0.04)] hover:shadow-lg text-left transition-all relative overflow-hidden">
<div class="absolute inset-x-0 bottom-0 h-1.5 bg-primary-fixed"></div>
<div class="w-10 h-10 rounded-full bg-primary-fixed/30 flex items-center justify-center mb-base text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">record_voice_over</span>
</div>
<p class="font-title-sm text-title-sm text-on-surface group-hover:text-primary transition-colors">Öğretmenime haber veririm</p>
<p class="text-body-base font-body-base text-on-surface-variant mt-1 opacity-80">Güvenli bir yetişkinden yardım al.</p>
</button>
<!-- Choice 3 -->
<button class="choice-btn group flex flex-col items-start p-md bg-white border-2 border-transparent hover:border-primary-fixed-dim rounded-3xl shadow-[0_10px_20px_rgba(0,0,0,0.04)] hover:shadow-lg text-left transition-all relative overflow-hidden">
<div class="absolute inset-x-0 bottom-0 h-1.5 bg-secondary-fixed"></div>
<div class="w-10 h-10 rounded-full bg-secondary-fixed/30 flex items-center justify-center mb-base text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">group_add</span>
</div>
<p class="font-title-sm text-title-sm text-on-surface group-hover:text-primary transition-colors">Arkadaşımı yanıma çağırırım</p>
<p class="text-body-base font-body-base text-on-surface-variant mt-1 opacity-80">Ona güvenli bir alan yarat.</p>
</button>
<!-- Choice 4 -->
<button class="choice-btn group flex flex-col items-start p-md bg-white border-2 border-transparent hover:border-primary-fixed-dim rounded-3xl shadow-[0_10px_20px_rgba(0,0,0,0.04)] hover:shadow-lg text-left transition-all relative overflow-hidden">
<div class="absolute inset-x-0 bottom-0 h-1.5 bg-tertiary-fixed"></div>
<div class="w-10 h-10 rounded-full bg-tertiary-fixed/30 flex items-center justify-center mb-base text-tertiary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">search</span>
</div>
<p class="font-title-sm text-title-sm text-on-surface group-hover:text-primary transition-colors">Neler olduğunu anlamaya çalışırım</p>
<p class="text-body-base font-body-base text-on-surface-variant mt-1 opacity-80">Önce durumu sakince analiz et.</p>
</button>
</section>
<!-- Illustration Card (Optional visual element to enhance game feel) -->
<section class="mt-base">
<div class="rounded-3xl overflow-hidden aspect-[21/9] shadow-lg border border-surface-variant/30">
<img alt="School canteen scene" class="w-full h-full object-cover" data-alt="A modern, vibrant digital illustration of a bright school canteen with floor-to-ceiling windows letting in soft morning light. The scene shows high-school students in the background, stylized in a friendly, empathetic academic optimism art style. In the foreground, there is an empty wooden table with a single lunch tray, suggesting a moment of solitude. The color palette uses soft sky blues, gentle lime greens, and warm corals to maintain a safe and supportive atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3GcavpGEHHqV-ginlId0o_SrQBteUi1oWi5jfUEf8CH1DMJr99SY6WGIMC1o1TWllaOq9YR-hcHyddiShDR9ZsrZMC1iVtQk0Aa9yiqId_jttbR6-G__ENxIkNDfDcOB629osNj52sDBijYsYLNAvTNSvO_nZrf1VMFKREsML8J-dOk5O0kqz1v2kzdbSSBrSdpgpFY0mmGUV_3DgJBzcuj7R6F-CFAkbK_ZVCX3kAdTMT0X_-KMe3RzSH9DW7oNoJ9waHB0KY60s"/>
</div>
</section>
</main>
<!-- Bottom Navigation Shell (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface-container-lowest dark:bg-inverse-surface border-t-2 border-surface-variant shadow-[0_-10px_30px_rgba(74,144,226,0.1)] rounded-t-xl">
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 transition-all" href="#">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-label-caps text-label-caps">Story</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-label-caps text-label-caps">Stats</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-label-caps text-label-caps">Map</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">support_agent</span>
<span class="font-label-caps text-label-caps">Help</span>
</a>
</nav>
<script>
        // Simple micro-interactions for game choices
        document.querySelectorAll('.choice-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // Add a temporary "correct" feel feedback
                this.classList.add('ring-4', 'ring-secondary-fixed/50');
                
                // Simulate loading next stage
                setTimeout(() => {
                    this.classList.remove('ring-4', 'ring-secondary-fixed/50');
                    alert('Harika bir seçim! Empati kurmak arkadaşlık bağlarını güçlendirir. +50 Puan!');
                }, 400);
            });
        });
    </script>
</body></html>
